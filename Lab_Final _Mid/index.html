<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIUB University Club Membership Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="form-header">
      <h1>AIUB Student Affairs Office</h1>
      <h2>University Club Membership Registration</h2>
    </header>

    <form id="registrationForm" novalidate>

      <!-- First Name -->
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
        <span class="error-msg" id="firstNameError"></span>
      </div>

      <!-- Last Name -->
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
        <span class="error-msg" id="lastNameError"></span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="example@student.aiub.edu">
        <span class="error-msg" id="emailError"></span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 8 chars, upper, lower, number, symbol">
        <span class="error-msg" id="passwordError"></span>
        <span class="attempt-msg" id="attemptMsg"></span>
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label class="inline-label"><input type="radio" name="gender" value="Male"> Male</label>
          <label class="inline-label"><input type="radio" name="gender" value="Female"> Female</label>
          <label class="inline-label"><input type="radio" name="gender" value="Other"> Other</label>
        </div>
        <span class="error-msg" id="genderError"></span>
      </div>

      <!-- Interested Clubs -->
      <div class="form-group">
        <label>Interested Clubs</label>
        <div class="checkbox-group">
          <label class="inline-label"><input type="checkbox" name="clubs" value="Robotics Club"> Robotics Club</label>
          <label class="inline-label"><input type="checkbox" name="clubs" value="Debate Club"> Debate Club</label>
          <label class="inline-label"><input type="checkbox" name="clubs" value="Cultural Club"> Cultural Club</label>
          <label class="inline-label"><input type="checkbox" name="clubs" value="Programming Club"> Programming Club</label>
          <label class="inline-label"><input type="checkbox" name="clubs" value="Photography Club"> Photography Club</label>
        </div>
        <span class="error-msg" id="clubsError"></span>
      </div>

      <!-- Club Category -->
      <div class="form-group">
        <label for="category">Club Category</label>
        <select id="category" name="category">
          <option value="" disabled selected>-- Select a category --</option>
          <option value="Technical">Technical</option>
          <option value="Cultural">Cultural</option>
          <option value="Sports">Sports</option>
          <option value="Social Service">Social Service</option>
        </select>
        <span class="error-msg" id="categoryError"></span>
      </div>

      <!-- Reason -->
      <div class="form-group">
        <label for="reason">Why do you want to join?</label>
        <textarea id="reason" name="reason" rows="4" placeholder="Write at least 20 characters..."></textarea>
        <span class="error-msg" id="reasonError"></span>
      </div>

      <button type="submit" id="submitBtn">Submit Registration</button>

      <div class="success-msg" id="successMsg"></div>
    </form>
  </div>

<script src="script.js"></script>
</body>
</html>
